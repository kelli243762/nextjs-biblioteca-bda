version: '3.8'

services:
  db:
    image: postgres:15
    container_name: biblioteca_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: biblioteca
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./db/reports_vw.sql:/docker-entrypoint-initdb.d/03_reports_vw.sql
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/04_indexes.sql
      - ./db/roles.sql:/docker-entrypoint-initdb.d/05_roles.sql
    ports:
      - "5432:5432"
    networks:
      - biblioteca_net

  app:
    build: .
    container_name: biblioteca_app
    environment:
      DATABASE_URL: postgresql://app_user:app123@db:5432/biblioteca
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - biblioteca_net

volumes:
  postgres_data:

networks:
  biblioteca_net: